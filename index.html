<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>KOBO Panadería</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --a50:#FAEEDA;--a100:#FAC775;--a200:#EF9F27;--a400:#BA7517;--a600:#854F0B;
  --b50:#E6F1FB;--b200:#85B7EB;--b400:#378ADD;--b600:#185FA5;--b800:#0C447C;
  --g50:#EAF3DE;--g400:#639922;--g800:#27500A;
  --p50:#EEEDFE;--p400:#7F77DD;--p600:#534AB7;
  --r50:#FCEBEB;--r400:#E24B4A;--r800:#791F1F;
  --gr50:#F1EFE8;--gr400:#888780;--gr600:#5F5E5A;
  --t50:#E1F5EE;--t400:#1D9E75;--t600:#0F6E56;
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eee;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --rad:12px;--rad-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;padding-bottom:72px;}

/* Loading */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px;}
#loading h2{font-size:22px;font-weight:700;color:var(--a400);}
#loading p{font-size:14px;color:var(--text2);}
.spinner{width:36px;height:36px;border:3px solid var(--a50);border-top-color:var(--a400);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Header */
.hdr{background:var(--bg);border-bottom:0.5px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:10px;}
.hdr-back{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);padding:0 4px;}
.hdr-title{font-size:18px;font-weight:700;flex:1;}
.hdr-title span{color:var(--a400);}
.hdr-date{font-size:12px;color:var(--text2);}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:0.5px solid var(--border);display:flex;z-index:50;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border:none;background:transparent;cursor:pointer;gap:3px;color:var(--text3);font-size:10px;}
.nb.active{color:var(--a400);}
.nb-icon{font-size:22px;line-height:1;}

/* Screens */
.screen{display:none;padding:14px 16px;}
.screen.active{display:block;}

/* Stats */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.stat{background:var(--bg);border-radius:var(--rad-sm);padding:12px;border:0.5px solid var(--border);}
.stat-lbl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.stat-val{font-size:24px;font-weight:700;color:var(--text);}
.stat-sub{font-size:11px;color:var(--text3);margin-top:1px;}

/* Sec header */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sec-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;}
.btn-new{font-size:13px;padding:7px 16px;border-radius:20px;border:none;background:var(--a400);color:#fff;cursor:pointer;font-weight:500;}

/* Search */
.search-wrap{position:relative;margin-bottom:12px;}
.search-wrap input{width:100%;padding:10px 12px 10px 36px;border:1px solid var(--border2);border-radius:var(--rad-sm);font-size:14px;background:var(--bg);color:var(--text);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text3);}

/* Chips */
.chips{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.chip{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;white-space:nowrap;}
.chip.active{background:var(--a400);color:#fff;border-color:var(--a400);}

/* Cards */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rad);padding:14px;margin-bottom:10px;cursor:pointer;}
.card:active{opacity:.85;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.card-name{font-size:15px;font-weight:600;color:var(--text);}
.card-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.card-body{font-size:13px;color:var(--text2);margin-bottom:8px;line-height:1.5;}
.card-foot{display:flex;align-items:center;justify-content:space-between;}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;}
.b-pend{background:var(--a50);color:var(--a600);}
.b-listo{background:var(--g50);color:var(--g800);}
.b-entre{background:var(--gr50);color:var(--gr600);}
.b-part{background:var(--a50);color:var(--a600);}
.b-prof{background:var(--b50);color:var(--b600);}
.b-alb{background:var(--p50);color:var(--p600);}
.price-lbl{font-size:15px;font-weight:600;}
.time-lbl{font-size:12px;color:var(--text3);}
.empty{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:14px;}

/* Client detail */
.detail-section{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rad);padding:14px;margin-bottom:10px;}
.detail-section h4{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:14px;}
.detail-row:last-child{border-bottom:none;}
.detail-row span:first-child{color:var(--text2);}
.detail-row span:last-child{font-weight:500;color:var(--text);text-align:right;}
.detail-row a{color:var(--b600);font-weight:500;}
.avatar-lg{width:52px;height:52px;border-radius:50%;background:var(--b50);color:var(--b800);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;}

/* Tarifa rows */
.tarifa-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--border);gap:8px;}
.tarifa-item:last-child{border-bottom:none;}
.tarifa-prod{font-size:14px;color:var(--text);flex:1;}
.tarifa-precio-val{font-size:14px;font-weight:600;color:var(--b600);min-width:52px;text-align:right;}
.tarifa-actions{display:flex;gap:6px;}
.icon-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:4px;color:var(--text3);}
.icon-btn:hover{color:var(--text);}

/* Tarifa cards */
.tarifa-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rad);padding:14px;margin-bottom:10px;cursor:pointer;}
.tarifa-card:active{opacity:.85;}
.tarifa-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.tarifa-card-name{font-size:15px;font-weight:600;color:var(--text);}
.tarifa-card-count{font-size:12px;color:var(--text3);}
.tarifa-preview{font-size:12px;color:var(--text2);line-height:1.6;}

/* Modal */
.modal-bd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;}
.modal-bd.open{display:flex;}
.modal{background:var(--bg);border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--text);}
.f-row{margin-bottom:12px;}
.f-lbl{font-size:13px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500;}
.f-row input,.f-row select,.f-row textarea{width:100%;padding:11px 12px;border:1px solid var(--border2);border-radius:var(--rad-sm);font-size:15px;background:var(--bg);color:var(--text);outline:none;}
.f-row input:focus,.f-row select:focus{border-color:var(--a400);}
.f-row textarea{height:72px;resize:none;}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.f-note{font-size:12px;color:var(--text3);margin-top:4px;}
.divider{height:0.5px;background:var(--border);margin:14px 0;}

/* Type toggle */
.type-toggle{display:flex;gap:8px;margin-bottom:14px;}
.tt-btn{flex:1;padding:10px;border-radius:var(--rad-sm);border:1px solid var(--border2);font-size:14px;cursor:pointer;background:var(--bg);color:var(--text2);font-weight:500;}
.tt-btn.ap{background:var(--a50);color:var(--a600);border-color:var(--a200);}
.tt-btn.ab{background:var(--b50);color:var(--b600);border-color:var(--b200);}

/* Product selector */
.prod-selector{border:1px solid var(--border2);border-radius:var(--rad);overflow:hidden;margin-bottom:12px;}
.prod-item{display:flex;align-items:center;padding:11px 14px;border-bottom:0.5px solid var(--border);gap:10px;}
.prod-item:last-child{border-bottom:none;}
.prod-info{flex:1;}
.prod-name{font-size:14px;font-weight:500;color:var(--text);}
.prod-price{font-size:12px;color:var(--text3);margin-top:1px;}
.qty-ctrl{display:flex;align-items:center;gap:10px;}
.qty-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border2);background:var(--bg2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);}
.qty-val{font-size:15px;font-weight:600;min-width:22px;text-align:center;}

/* Total box */
.total-box{background:var(--a50);border-radius:var(--rad-sm);padding:14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.total-lbl{font-size:14px;color:var(--a600);font-weight:500;}
.total-val{font-size:22px;font-weight:700;color:var(--a600);}
.total-iva{font-size:11px;color:var(--a400);margin-top:2px;text-align:right;}

/* Buttons */
.btn-ok{width:100%;padding:14px;background:var(--a400);color:#fff;border:none;border-radius:var(--rad);font-size:16px;font-weight:600;cursor:pointer;margin-top:6px;}
.btn-ok:active{background:var(--a600);}
.btn-secondary{width:100%;padding:11px;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:var(--rad);font-size:14px;cursor:pointer;margin-top:8px;}
.btn-danger-sm{padding:8px 14px;background:var(--r50);color:var(--r800);border:1px solid var(--r400);border-radius:var(--rad-sm);font-size:13px;cursor:pointer;}

/* Status row */
.status-row{display:flex;gap:8px;margin-top:10px;}
.status-btn{flex:1;padding:9px;border-radius:var(--rad-sm);border:1px solid var(--border2);font-size:13px;cursor:pointer;background:var(--bg2);color:var(--text2);font-weight:500;}
.status-btn.sp{background:var(--a50);color:var(--a600);border-color:var(--a200);}
.status-btn.sl{background:var(--g50);color:var(--g800);border-color:var(--g400);}
.status-btn.se{background:var(--gr50);color:var(--gr600);border-color:var(--gr400);}

/* Inline edit */
.inline-edit{display:flex;align-items:center;gap:6px;}
.inline-edit input{width:80px;padding:6px 8px;border:1px solid var(--a400);border-radius:6px;font-size:14px;font-weight:600;color:var(--b600);text-align:right;}
.inline-save{background:var(--a400);color:#fff;border:none;border-radius:6px;padding:6px 10px;font-size:12px;cursor:pointer;}

/* Toast */
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <h2>KOBO</h2>
  <p>Cargando datos...</p>
</div>

<!-- HEADER -->
<div class="hdr" id="hdr">
  <button class="hdr-back" id="hdr-back" style="display:none" onclick="goBack()">←</button>
  <div class="hdr-title" id="hdr-title">KO<span>BO</span></div>
  <div class="hdr-date" id="hdr-date"></div>
</div>

<!-- SCREEN: PEDIDOS -->
<div class="screen active" id="scr-pedidos">
  <div class="stats">
    <div class="stat"><div class="stat-lbl">Activos hoy</div><div class="stat-val" id="s-activos">—</div><div class="stat-sub">pedidos</div></div>
    <div class="stat"><div class="stat-lbl">Este mes</div><div class="stat-val" id="s-mes">—</div><div class="stat-sub">facturado</div></div>
  </div>
  <div class="sec-hdr"><span class="sec-title">Pedidos</span><button class="btn-new" onclick="openNuevoPedido()">+ Nuevo</button></div>
  <div class="chips">
    <button class="chip active" onclick="filterPedidos('todos',this)">Todos</button>
    <button class="chip" onclick="filterPedidos('particular',this)">Particulares</button>
    <button class="chip" onclick="filterPedidos('profesional',this)">Profesionales</button>
    <button class="chip" onclick="filterPedidos('pendiente',this)">Pendientes</button>
    <button class="chip" onclick="filterPedidos('listo',this)">Listos</button>
  </div>
  <div id="orders-list"></div>
</div>

<!-- SCREEN: CLIENTES -->
<div class="screen" id="scr-clientes">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Buscar por nombre o NIF..." oninput="filterClientes(this.value)" id="search-clientes"/>
  </div>
  <div class="sec-hdr"><span class="sec-title">Clientes profesionales</span><button class="btn-new" onclick="openNuevoCliente()">+ Nuevo</button></div>
  <div id="clients-list"></div>
</div>

<!-- SCREEN: DETALLE CLIENTE -->
<div class="screen" id="scr-cliente-detail">
  <div id="cliente-detail-body"></div>
</div>

<!-- SCREEN: ALBARANES -->
<div class="screen" id="scr-albaranes">
  <div class="stats">
    <div class="stat"><div class="stat-lbl">Por facturar</div><div class="stat-val" id="s-porfacturar">—</div><div class="stat-sub">importe</div></div>
    <div class="stat"><div class="stat-lbl">Este mes</div><div class="stat-val" id="s-alb-mes">—</div><div class="stat-sub">albaranes</div></div>
  </div>
  <div class="sec-hdr"><span class="sec-title">Albaranes</span></div>
  <div id="alb-list"></div>
</div>

<!-- SCREEN: TARIFAS -->
<div class="screen" id="scr-tarifas">
  <div class="sec-hdr"><span class="sec-title">Tarifas</span><button class="btn-new" onclick="openNuevaTarifa()">+ Nueva</button></div>
  <div id="tarifas-list"></div>
</div>

<!-- SCREEN: DETALLE TARIFA -->
<div class="screen" id="scr-tarifa-detail">
  <div id="tarifa-detail-body"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav" id="bnav">
  <button class="nb active" onclick="switchTab('pedidos',this)"><span class="nb-icon">📋</span>Pedidos</button>
  <button class="nb" onclick="switchTab('clientes',this)"><span class="nb-icon">🏪</span>Clientes</button>
  <button class="nb" onclick="switchTab('albaranes',this)"><span class="nb-icon">📄</span>Albaranes</button>
  <button class="nb" onclick="switchTab('tarifas',this)"><span class="nb-icon">💰</span>Tarifas</button>
</nav>

<!-- MODAL -->
<div class="modal-bd" id="modal" onclick="closeMOut(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbykvz5mvtq37Z_vFJh1wCh4pkWqwjrzsXWdNWopCaSeLSyxS4kOlbj4LMDtCHLVjQu5/exec';
const IVA = 0.04;

let productos=[], clientes=[], pedidos=[], albaranes=[], tarifas=[];
let curFilter='todos', curQtys={}, curTipo='particular', curClienteId=null;
let prevScreen=null, curTarifaId=null, curClienteDetailId=null;

async function api(params){
  const url=SCRIPT_URL+'?'+new URLSearchParams(params);
  const r=await fetch(url);
  return r.json();
}

async function loadAll(){
  try{
    [productos,clientes,pedidos,albaranes,tarifas]=await Promise.all([
      api({action:'getProductos'}),
      api({action:'getClientes'}),
      api({action:'getPedidos'}),
      api({action:'getAlbaranes'}),
      api({action:'getTarifas'}),
    ]);
    pedidos=pedidos.map(p=>({...p,Lineas:p.Lineas?tryParse(p.Lineas):[]}));
    albaranes=albaranes.map(a=>({...a,Lineas:a.Lineas?tryParse(a.Lineas):[]}));
    renderAll();
    document.getElementById('loading').style.display='none';
  }catch(e){
    document.getElementById('loading').innerHTML='<p style="color:red;padding:2rem;text-align:center">Error conectando.<br>Comprueba tu conexión.</p>';
  }
}

function tryParse(s){try{return JSON.parse(s);}catch{return[];}}

function renderAll(){
  renderPedidos(curFilter);
  renderClientes('');
  renderAlbaranes();
  renderTarifas();
  updateStats();
}

function fmtDate(d){
  if(!d||d==='—'||d==='')return'—';
  const s=d.toString().trim();
  if(s.includes('T'))return s.slice(0,10).split('-').reverse().join('/');
  if(s.match(/^\d{4}-\d{2}-\d{2}$/))return s.split('-').reverse().join('/');
  return s;
}
function fmtDateShort(d){
  const f=fmtDate(d);
  if(f==='—')return'—';
  const p=f.split('/');
  return p[0]+'/'+p[1];
}
function initials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function resumeLineas(l){if(!l||!l.length)return'—';return l.map(x=>`${x.qty} ${x.nombre}`).join(', ');}

function updateStats(){
  const activos=pedidos.filter(p=>p.Estado!=='entregado').length;
  const now=new Date();
  const mesStr=String(now.getMonth()+1).padStart(2,'0');
  const anyoStr=String(now.getFullYear());
  const totalMes=pedidos.filter(p=>{const f=(p.Fecha||'').toString();return f.startsWith(anyoStr+'-'+mesStr);}).reduce((s,p)=>s+(parseFloat(p.Total)||0),0);
  document.getElementById('s-activos').textContent=activos;
  document.getElementById('s-mes').textContent='€'+Math.round(totalMes*1.04);
  const porFact=albaranes.filter(a=>a.Facturado!=='SI').reduce((s,a)=>s+(parseFloat(a.Importe)||0),0);
  const albMes=albaranes.filter(a=>(a.Fecha||'').toString().startsWith(anyoStr+'-'+mesStr)).length;
  document.getElementById('s-porfacturar').textContent='€'+porFact.toFixed(0);
  document.getElementById('s-alb-mes').textContent=albMes;
}

// --- PEDIDOS ---
function renderPedidos(filter){
  const list=document.getElementById('orders-list');
  let data=[...pedidos].reverse();
  if(filter==='particular'||filter==='profesional')data=data.filter(p=>p.Tipo===filter);
  else if(filter==='pendiente'||filter==='listo')data=data.filter(p=>p.Estado===filter);
  if(!data.length){list.innerHTML='<div class="empty">Sin pedidos</div>';return;}
  list.innerHTML=data.map(p=>{
    const bE=p.Estado==='pendiente'?'b-pend':p.Estado==='listo'?'b-listo':'b-entre';
    const lE=p.Estado==='pendiente'?'Pendiente':p.Estado==='listo'?'Listo':'Entregado';
    const tB=p.Tipo==='profesional'?'<span class="badge b-prof" style="margin-right:4px">Prof.</span>':'<span class="badge b-part" style="margin-right:4px">Part.</span>';
    const aB=p.Albaran?`<span class="badge b-alb">${p.Albaran}</span>`:'';
    const totalIva=((parseFloat(p.Total)||0)*1.04).toFixed(2);
    return`<div class="card" onclick="openDetallePedido('${p.ID}')">
      <div class="card-top"><div><div class="card-name">${p.Cliente}</div><div class="card-sub">${p.ID}</div></div><span class="badge ${bE}">${lE}</span></div>
      <div class="card-body">${resumeLineas(p.Lineas)}</div>
      <div class="card-foot"><div style="display:flex;gap:4px;flex-wrap:wrap">${tB}${aB}</div><div style="text-align:right"><div class="price-lbl">€${totalIva}</div><div class="time-lbl">${fmtDateShort(p.Fecha)} · ${p.Hora||''}</div></div></div>
    </div>`;
  }).join('');
}

function filterPedidos(f,el){
  curFilter=f;
  document.querySelectorAll('#scr-pedidos .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderPedidos(f);
}

// --- CLIENTES ---
function renderClientes(q){
  const list=document.getElementById('clients-list');
  let data=clientes;
  if(q){const ql=q.toLowerCase();data=data.filter(c=>c.Nombre.toLowerCase().includes(ql)||c.NIF.toLowerCase().includes(ql));}
  if(!data.length){list.innerHTML='<div class="empty">Sin clientes</div>';return;}
  list.innerHTML=data.map(c=>{
    const nProd=tarifas.filter(t=>t.TarifaID===c.TarifaID).length;
    const tNombre=c.TarifaID?`Tarifa: ${getTarifaNombre(c.TarifaID)}`:'Sin tarifa asignada';
    return`<div class="card" onclick="openClienteDetail('${c.ID}')">
      <div class="card-top">
        <div style="display:flex;align-items:center;gap:10px">

  const nombre=rows[0]?.Nombre||tid;

          const p=productos.find(x=>x.ID===r.ProductoID);
          return`<div class="tarifa-item" id="trow-${r.ProductoID}">
            <span class="tarifa-prod">${p?p.Nombre+' '+p.Formato:r.ProductoID}</span>
            <div class="tarifa-actions">
              <span class="tarifa-precio-val" id="tpv-${r.ProductoID}">€${parseFloat(r.Precio).toFixed(2)}</span>
              <button class="icon-btn" onclick="editarPrecioTarifa('${tid}','${r.ProductoID}')">✏️</button>
              <button class="icon-btn" onclick="quitarProductoTarifa('${tid}','${r.ProductoID}')">🗑️</button>
            </div>

        }).join('')}

      <button class="btn-new" style="margin-top:12px;width:100%;border-radius:var(--rad-sm)" onclick="openAnadirProductoTarifa('${tid}')">+ Añadir producto</button>

function editarPrecioTarifa(tid,pid){
  const row=tarifas.find(t=>t.TarifaID===tid&&t.ProductoID===pid);
  if(!row)return;
  const el=document.getElementById('tpv-'+pid);
  const precioActual=parseFloat(row.Precio).toFixed(2);
  el.outerHTML=`<div class="inline-edit"><input type="number" id="inp-${pid}" value="${precioActual}" step="0.01" style="width:80px"/><button class="inline-save" onclick="guardarPrecioTarifa('${tid}','${pid}')">✓</button></div>`;
  setTimeout(()=>document.getElementById('inp-'+pid)?.focus(),50);
}

async function guardarPrecioTarifa(tid,pid){
  const inp=document.getElementById('inp-'+pid);
  if(!inp)return;
  const nuevo=parseFloat(inp.value);
  if(isNaN(nuevo)||nuevo<=0){showToast('Precio inválido');return;}
  await api({action:'updateTarifaRow',data:JSON.stringify({TarifaID:tid,ProductoID:pid,Precio:nuevo.toFixed(2)})});
  const row=tarifas.find(t=>t.TarifaID===tid&&t.ProductoID===pid);
  if(row)row.Precio=nuevo.toFixed(2);
  renderTarifaDetail(tid);
  showToast('✓ Precio actualizado');
}

function openAnadirProductoTarifa(tid){
  const yaEnTarifa=tarifas.filter(t=>t.TarifaID===tid).map(t=>t.ProductoID);
  const disponibles=productos.filter(p=>!yaEnTarifa.includes(p.ID));
  if(!disponibles.length){showToast('Todos los productos ya están en esta tarifa');return;}
  openModal('Añadir producto',`
    <div class="f-row"><label class="f-lbl">Producto</label>
      <select id="f-addprod"><option value="">Seleccionar...</option>${disponibles.map(p=>`<option value="${p.ID}">${p.Nombre} ${p.Formato}</option>`).join('')}</select>
    </div>
    <div class="f-row"><label class="f-lbl">Precio sin IVA (€)</label><input type="number" id="f-addprecio" placeholder="0.00" step="0.01"/></div>
    <button class="btn-ok" onclick="saveProductoEnTarifa('${tid}')">Añadir</button>
    <button class="btn-secondary" onclick="closeModal()">Cancelar</button>`);
}

async function saveProductoEnTarifa(tid){
  const pid=document.getElementById('f-addprod')?.value;
  const precio=parseFloat(document.getElementById('f-addprecio')?.value);
  if(!pid){showToast('Selecciona un producto');return;}
  if(isNaN(precio)||precio<=0){showToast('Introduce un precio válido');return;}
  const nombre=getTarifaNombre(tid);
  await api({action:'saveTarifaRow',data:JSON.stringify({TarifaID:tid,Nombre:nombre,ProductoID:pid,Precio:precio.toFixed(2)})});
  tarifas.push({TarifaID:tid,Nombre:nombre,ProductoID:pid,Precio:precio.toFixed(2)});
  closeModal();
  renderTarifaDetail(tid);
  renderTarifas();
  showToast('✓ Producto añadido');
}

async function quitarProductoTarifa(tid,pid){
  if(!confirm('¿Quitar este producto de la tarifa?'))return;
  await api({action:'deleteTarifaRow',data:JSON.stringify({TarifaID:tid,ProductoID:pid})});
  const i=tarifas.findIndex(t=>t.TarifaID===tid&&t.ProductoID===pid);
  if(i>-1)tarifas.splice(i,1);
  renderTarifaDetail(tid);
  renderTarifas();
  showToast('✓ Producto eliminado');
}

async function confirmarEliminarTarifa(tid){
  if(!confirm('¿Eliminar esta tarifa? Los clientes que la usen quedarán sin tarifa.'))return;
  await api({action:'deleteTarifaRows',data:JSON.stringify({TarifaID:tid})});
  tarifas=tarifas.filter(t=>t.TarifaID!==tid);
  clientes.forEach(c=>{if(c.TarifaID===tid)c.TarifaID='';});
  goBack();
  renderTarifas();
  showToast('✓ Tarifa eliminada');
}

function buildPedidoForm(){
  return`
    <div class="type-toggle">
      <button class="tt-btn ap" id="tt-part" onclick="setTipo('particular')">Particular</button>
      <button class="tt-btn" id="tt-prof" onclick="setTipo('profesional')">Profesional</button>

    <div class="divider"></div>

    <div class="prod-selector" id="prod-selector">${buildProdSelector()}</div>
    <div class="total-box">
      <span class="total-lbl">Total sin IVA</span>
      <div style="text-align:right"><div class="total-val" id="total-display">€0.00</div><div class="total-iva" id="total-iva">Con IVA (4%): €0.00</div></div>
    </div>
    <div class="f-grid">
      <div class="f-row"><label class="f-lbl">Fecha recogida</label><input type="date" id="f-fecha"/></div>

    </div>
    <button class="btn-ok" onclick="savePedido()">Guardar pedido</button>
    <button class="btn-secondary" onclick="closeModal()">Cancelar</button>`;
}

function buildProdSelector(){
  let prods=[];
  if(curTipo==='particular'){
    prods=productos.filter(p=>p.Solo_Prof!=='SI'&&p.PVP&&p.PVP!=='');
  } else {
    if(!curClienteId)return'<div style="padding:20px;text-align:center;font-size:13px;color:var(--text3)">Selecciona un cliente para ver sus productos</div>';
    const c=clientes.find(x=>x.ID===curClienteId);
    const tRows=c&&c.TarifaID?tarifas.filter(t=>t.TarifaID===c.TarifaID&&t.ProductoID&&t.ProductoID!==''):[];
    prods=tRows.map(t=>({...productos.find(p=>p.ID===t.ProductoID)||{ID:t.ProductoID,Nombre:t.ProductoID,Formato:'',Unidad:'ud'},_precio:t.Precio})).filter(p=>p.Nombre);
  }
  if(!prods.length)return'<div style="padding:20px;text-align:center;font-size:13px;color:var(--text3)">Sin productos disponibles</div>';
  return prods.map(p=>{
    const precio=curTipo==='profesional'?(parseFloat(p._precio)||0):parseFloat(p.PVP)||0;
    return`<div class="prod-item">
      <div class="prod-info"><div class="prod-name">${p.Nombre} <span style="font-size:11px;color:var(--text3)">${p.Formato}</span></div><div class="prod-price">€${precio.toFixed(2)} / ${p.Unidad||'ud'} (sin IVA)</div></div>
      <div class="qty-ctrl"><button class="qty-btn" onclick="changeQty('${p.ID}',-1)">−</button><span class="qty-val" id="qty-${p.ID}">${curQtys[p.ID]||0}</span><button class="qty-btn" onclick="changeQty('${p.ID}',1)">+</button></div>
    </div>`;
  }).join('');
}

function getPrecio(prodId){
  if(curTipo==='profesional'&&curClienteId){
    const c=clientes.find(x=>x.ID===curClienteId);
    if(c&&c.TarifaID){const t=tarifas.find(x=>x.TarifaID===c.TarifaID&&x.ProductoID===prodId);if(t)return parseFloat(t.Precio)||0;}
  }
  return parseFloat(productos.find(p=>p.ID===prodId)?.PVP)||0;
}

function calcTotal(){return productos.reduce((s,p)=>s+(curQtys[p.ID]||0)*getPrecio(p.ID),0);}

function updateTotal(){
  const t=calcTotal();
  const el=document.getElementById('total-display');
  const elI=document.getElementById('total-iva');
  if(el)el.textContent='€'+t.toFixed(2);
  if(elI)elI.textContent='Con IVA (4%): €'+(t*1.04).toFixed(2);
}

function changeQty(prodId,delta){
  curQtys[prodId]=Math.max(0,(curQtys[prodId]||0)+delta);
  const el=document.getElementById('qty-'+prodId);
  if(el)el.textContent=curQtys[prodId];
  updateTotal();
}

function setTipo(t){
  curTipo=t;curClienteId=null;curQtys={};
  document.getElementById('tt-part').className=t==='particular'?'tt-btn ap':'tt-btn';
  document.getElementById('tt-prof').className=t==='profesional'?'tt-btn ab':'tt-btn';
  const cc=document.getElementById('campo-cliente');
  if(t==='particular'){
    cc.innerHTML=`<label class="f-lbl">Cliente</label><input type="text" id="f-cli" placeholder="Nombre del cliente"/>`;
  } else {
    const opts=clientes.map(c=>`<option value="${c.ID}">${c.Nombre}</option>`).join('');
    cc.innerHTML=`<label class="f-lbl">Cliente</label><select id="f-cli-sel" onchange="onClienteChange(this.value)"><option value="">Seleccionar cliente...</option>${opts}</select>`;
  }
  document.getElementById('prod-selector').innerHTML=buildProdSelector();
  updateTotal();
}

function onClienteChange(val){
  curClienteId=val||null;
  curQtys={};
  document.getElementById('prod-selector').innerHTML=buildProdSelector();
  updateTotal();
}

async function savePedido(){
  const lineas=productos.filter(p=>(curQtys[p.ID]||0)>0).map(p=>({id:p.ID,nombre:`${p.Nombre} ${p.Formato}`,qty:curQtys[p.ID],unidad:p.Unidad||'ud'}));
  if(!lineas.length){showToast('Añade al menos un producto');return;}
  let clienteNombre='';
  if(curTipo==='particular'){clienteNombre=document.getElementById('f-cli')?.value.trim()||'';}
  else{const s=document.getElementById('f-cli-sel');clienteNombre=s?s.options[s.selectedIndex]?.text:'';}
  if(!clienteNombre||(curTipo==='profesional'&&!curClienteId)){showToast('Selecciona un cliente');return;}
  const fecha=document.getElementById('f-fecha')?.value||new Date().toISOString().slice(0,10);
  const hora=document.getElementById('f-hora')?.value||'';
  const total=calcTotal();
  const newId='P-'+String(pedidos.length+1).padStart(3,'0');
  const albId=curTipo==='profesional'?'ALB-'+String(albaranes.length+1).padStart(3,'0'):'';
  const pedido={ID:newId,Cliente:clienteNombre,Tipo:curTipo,Fecha:fecha,Hora:hora,Estado:'pendiente',Total:total.toFixed(2),Albaran:albId,Lineas:JSON.stringify(lineas)};
  showToast('Guardando...');
  await api({action:'savePedido',data:JSON.stringify(pedido)});
  if(albId){
    const alb={ID:albId,ClienteID:clienteNombre,Fecha:fecha,Lineas:JSON.stringify(lineas),Importe:total.toFixed(2),Facturado:'NO'};
    await api({action:'saveAlbaran',data:JSON.stringify(alb)});
    albaranes.push({...alb,Lineas:lineas});
    const cliente=clientes.find(c=>c.ID===curClienteId);
    if(cliente){
      const np=(parseFloat(cliente.Pendiente)||0)+total;
      await api({action:'updateCliente',data:JSON.stringify({ID:curClienteId,Pendiente:np.toFixed(2),UltimoPedido:fecha})});
      cliente.Pendiente=np.toFixed(2);cliente.UltimoPedido=fecha;
    }
  }
  pedidos.push({...pedido,Lineas:lineas});
  closeModal();renderAll();showToast('✓ Pedido guardado');
}

    <div class="f-row"><label class="f-lbl">Nombre del negocio</label><input type="text" id="f-neg" placeholder="Café Ejemplo"/></div>
    <div class="f-row"><label class="f-lbl">NIF / CIF</label><input type="text" id="f-nif" placeholder="B12345678"/></div>
    <div class="f-row"><label class="f-lbl">Persona de contacto</label><input type="text" id="f-con" placeholder="Nombre y apellido"/></div>
    <div class="f-row"><label class="f-lbl">Teléfono</label><input type="tel" id="f-tel" placeholder="600 000 000"/></div>
    <div class="f-row"><label class="f-lbl">Dirección</label><input type="text" id="f-dir" placeholder="Calle, número, ciudad"/></div>
    <div class="f-row"><label class="f-lbl">Tarifa asignada</label><select id="f-tarifa"><option value="">Sin tarifa</option>${tarifaOpts}</select></div>
    <button class="btn-ok" onclick="saveCliente()">Guardar cliente</button>
    <button class="btn-secondary" onclick="closeModal()">Cancelar</button>`);
}

function openEditarCliente(id){
  const c=clientes.find(x=>x.ID===id);
  if(!c)return;
  const tarifaOpts=getTarifasOpts(c.TarifaID);
  openModal('Editar cliente',`
    <div class="f-row"><label class="f-lbl">Nombre del negocio</label><input type="text" id="f-neg" value="${c.Nombre}"/></div>
    <div class="f-row"><label class="f-lbl">NIF / CIF</label><input type="text" id="f-nif" value="${c.NIF}"/></div>
    <div class="f-row"><label class="f-lbl">Persona de contacto</label><input type="text" id="f-con" value="${c.Contacto||''}"/></div>
    <div class="f-row"><label class="f-lbl">Teléfono</label><input type="tel" id="f-tel" value="${c.Telefono||''}"/></div>
    <div class="f-row"><label class="f-lbl">Dirección</label><input type="text" id="f-dir" value="${c.Direccion||''}"/></div>
    <div class="f-row"><label class="f-lbl">Tarifa asignada</label><select id="f-tarifa"><option value="">Sin tarifa</option>${tarifaOpts}</select></div>
    <button class="btn-ok" onclick="saveEditarCliente('${id}')">Guardar cambios</button>
    <button class="btn-secondary" onclick="closeModal()">Cancelar</button>`);
}

function getTarifasOpts(selId=''){
  const ids=[...new Set(tarifas.filter(t=>t.ProductoID).map(t=>t.TarifaID))];
  return ids.map(tid=>{const n=getTarifaNombre(tid);return`<option value="${tid}" ${tid===selId?'selected':''}>${n}</option>`;}).join('');
}

async function saveCliente(){
  const neg=document.getElementById('f-neg')?.value.trim()||'';
  const nif=document.getElementById('f-nif')?.value.trim()||'';
  if(!neg||!nif){showToast('Nombre y NIF obligatorios');return;}
  const tid=document.getElementById('f-tarifa')?.value||'';
  const newId='C-'+String(clientes.length+1).padStart(3,'0');
  const hoy=new Date().toISOString().slice(0,10);
  const c={ID:newId,Nombre:neg,NIF:nif,Contacto:document.getElementById('f-con')?.value.trim()||'',Telefono:document.getElementById('f-tel')?.value.trim()||'',Direccion:document.getElementById('f-dir')?.value.trim()||'',Alta:hoy,UltimoPedido:'',Pendiente:'0',TarifaID:tid};
  showToast('Guardando...');
  await api({action:'saveCliente',data:JSON.stringify(c)});
  clientes.push(c);
  closeModal();renderClientes('');showToast('✓ Cliente guardado');
}

async function saveEditarCliente(id){
  const c=clientes.find(x=>x.ID===id);
  if(!c)return;
  c.Nombre=document.getElementById('f-neg')?.value.trim()||c.Nombre;
  c.NIF=document.getElementById('f-nif')?.value.trim()||c.NIF;
  c.Contacto=document.getElementById('f-con')?.value.trim()||'';
  c.Telefono=document.getElementById('f-tel')?.value.trim()||'';
  c.Direccion=document.getElementById('f-dir')?.value.trim()||'';
  c.TarifaID=document.getElementById('f-tarifa')?.value||'';
  await api({action:'updateCliente',data:JSON.stringify(c)});
  closeModal();
  openClienteDetail(id);
  showToast('✓ Cliente actualizado');
}

// --- NAV / SCREEN ---
function switchTab(tab,el){
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  ['pedidos','clientes','albaranes','tarifas'].forEach(s=>{
    document.getElementById('scr-'+s).classList.toggle('active',s===tab);
  });
  document.getElementById('scr-cliente-detail').classList.remove('active');
  document.getElementById('scr-tarifa-detail').classList.remove('active');
  setHdr(tab==='pedidos'?'KO<span style="color:var(--a400)">BO</span>':tab.charAt(0).toUpperCase()+tab.slice(1),false);
  prevScreen=null;
}

function showScreen(scr,prev){
  ['scr-pedidos','scr-clientes','scr-albaranes','scr-tarifas','scr-cliente-detail','scr-tarifa-detail'].forEach(s=>{
    document.getElementById(s).classList.toggle('active',s===scr);
  });
  prevScreen=prev;
}

function goBack(){
  if(!prevScreen)return;
  showScreen(prevScreen,null);
  const tab=prevScreen.replace('scr-','');
  setHdr(tab.charAt(0).toUpperCase()+tab.slice(1),false);
  document.querySelectorAll('.nb').forEach((b,i)=>{
    b.classList.toggle('active',['pedidos','clientes','albaranes','tarifas'][i]===tab);
  });
  if(tab==='clientes')renderClientes('');
  if(tab==='tarifas')renderTarifas();
}

function setHdr(title,showBack){
  document.getElementById('hdr-title').innerHTML=title;
  document.getElementById('hdr-back').style.display=showBack?'block':'none';
  document.getElementById('hdr-date').style.display=showBack?'none':'block';
}

// --- MODAL ---
function openModal(title,body){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function closeMOut(e){if(e.target===document.getElementById('modal'))closeModal();}

// --- TOAST ---
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// --- INIT ---
const d=new Date();
document.getElementById('hdr-date').textContent=d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
loadAll();
</script>
</body>
</html>
