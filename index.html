<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>KOBO Panadería</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --a50:#FAEEDA;--a100:#FAC775;--a200:#EF9F27;--a400:#BA7517;--a600:#854F0B;--a800:#633806;
  --t50:#E1F5EE;--t400:#1D9E75;--t600:#0F6E56;
  --b50:#E6F1FB;--b200:#85B7EB;--b400:#378ADD;--b600:#185FA5;--b800:#0C447C;
  --g50:#EAF3DE;--g400:#639922;--g800:#27500A;
  --p50:#EEEDFE;--p400:#7F77DD;--p600:#534AB7;
  --r50:#FCEBEB;--r400:#E24B4A;--r800:#791F1F;
  --gr50:#F1EFE8;--gr100:#D3D1C7;--gr400:#888780;--gr600:#5F5E5A;
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede9;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --radius:12px;--radius-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;padding-bottom:80px;}

/* Loading */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px;}
#loading h2{font-size:20px;font-weight:600;color:var(--a400);}
#loading p{font-size:14px;color:var(--text2);}
.spinner{width:36px;height:36px;border:3px solid var(--a50);border-top-color:var(--a400);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Header */
.header{background:var(--bg);border-bottom:0.5px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;}
.brand{font-size:20px;font-weight:700;letter-spacing:.05em;color:var(--text);}
.brand span{color:var(--a400);}
.header-date{font-size:12px;color:var(--text2);}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:0.5px solid var(--border);display:flex;z-index:50;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;border:none;background:transparent;cursor:pointer;gap:4px;color:var(--text3);font-size:10px;transition:color .15s;}
.nav-btn.active{color:var(--a400);}
.nav-icon{font-size:20px;line-height:1;}

/* Panels */
.panel{display:none;padding:16px;}
.panel.active{display:block;}

/* Stats */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.stat{background:var(--bg);border-radius:var(--radius-sm);padding:12px;border:0.5px solid var(--border);}
.stat-lbl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.stat-val{font-size:24px;font-weight:600;color:var(--text);}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px;}

/* Section header */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sec-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;}
.btn-new{font-size:13px;padding:7px 14px;border-radius:20px;border:none;background:var(--a400);color:white;cursor:pointer;font-weight:500;}

/* Filter chips */
.chips{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.chip{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;white-space:nowrap;}
.chip.active{background:var(--a400);color:white;border-color:var(--a400);}

/* Cards */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.card-name{font-size:15px;font-weight:600;color:var(--text);}
.card-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.card-body{font-size:13px;color:var(--text2);margin-bottom:8px;line-height:1.5;}
.card-foot{display:flex;align-items:center;justify-content:space-between;}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;}
.b-pend{background:var(--a50);color:var(--a600);}
.b-listo{background:var(--g50);color:var(--g800);}
.b-entre{background:var(--gr50);color:var(--gr600);}
.b-part{background:var(--a50);color:var(--a600);}
.b-prof{background:var(--b50);color:var(--b600);}
.b-alb{background:var(--p50);color:var(--p600);}
.price-lbl{font-size:15px;font-weight:600;color:var(--text);}
.time-lbl{font-size:12px;color:var(--text3);}
.empty{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:14px;}

/* Client card */
.client-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.client-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--b50);color:var(--b800);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0;}
.client-rows{border-top:0.5px solid var(--border);padding-top:10px;display:grid;gap:5px;}
.client-row{display:flex;justify-content:space-between;font-size:13px;}
.client-row span:first-child{color:var(--text2);}
.client-row span:last-child{font-weight:500;color:var(--text);text-align:right;max-width:60%;}
.pend-strip{display:flex;align-items:center;justify-content:space-between;background:var(--p50);border-radius:var(--radius-sm);padding:9px 12px;margin-top:10px;}
.pend-strip span{font-size:13px;color:var(--p600);font-weight:500;}
.pend-btn{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--p600);background:transparent;color:var(--p600);cursor:pointer;}

/* Tarifas */
.tarifa-section{margin-top:10px;border-top:0.5px solid var(--border);padding-top:10px;}
.tarifa-title{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.tarifa-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:13px;}
.tarifa-row:last-child{border-bottom:none;}
.tarifa-nombre{color:var(--text);}
.tarifa-precio{font-weight:600;color:var(--b600);}

/* Modal */
.modal-bd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;}
.modal-bd.open{display:flex;}
.modal{background:var(--bg);border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:18px;font-weight:600;margin-bottom:16px;color:var(--text);}
.f-row{margin-bottom:12px;}
.f-lbl{font-size:13px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500;}
.f-row input,.f-row select,.f-row textarea{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:15px;background:var(--bg);color:var(--text);outline:none;}
.f-row input:focus,.f-row select:focus{border-color:var(--a400);}
.f-row textarea{height:70px;resize:none;}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.type-toggle{display:flex;gap:8px;margin-bottom:14px;}
.tt-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border2);font-size:14px;cursor:pointer;background:var(--bg);color:var(--text2);font-weight:500;transition:all .15s;}
.tt-btn.ap{background:var(--a50);color:var(--a600);border-color:var(--a200);}
.tt-btn.ab{background:var(--b50);color:var(--b600);border-color:var(--b200);}
.divider{height:0.5px;background:var(--border);margin:14px 0;}
.f-note{font-size:12px;color:var(--text3);margin-top:4px;}

/* Product selector */
.prod-selector{border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;}
.prod-item{display:flex;align-items:center;padding:11px 14px;border-bottom:0.5px solid var(--border);gap:10px;}
.prod-item:last-child{border-bottom:none;}
.prod-info{flex:1;}
.prod-name{font-size:14px;font-weight:500;color:var(--text);}
.prod-price{font-size:12px;color:var(--text3);margin-top:1px;}
.qty-ctrl{display:flex;align-items:center;gap:10px;}
.qty-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border2);background:var(--bg2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);line-height:1;}
.qty-val{font-size:15px;font-weight:600;min-width:22px;text-align:center;color:var(--text);}
.qty-unit{font-size:11px;color:var(--text3);}
.total-box{background:var(--a50);border-radius:var(--radius-sm);padding:14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.total-lbl{font-size:14px;color:var(--a600);font-weight:500;}
.total-val{font-size:22px;font-weight:700;color:var(--a600);}
.iva-note{font-size:11px;color:var(--a400);margin-top:2px;text-align:right;}

/* Buttons */
.btn-ok{width:100%;padding:14px;background:var(--a400);color:white;border:none;border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;margin-top:6px;}
.btn-ok:active{background:var(--a600);}
.btn-cancel{width:100%;padding:11px;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;cursor:pointer;margin-top:8px;}
.btn-danger{background:var(--r50);color:var(--r800);border-color:var(--r400);}

/* Status buttons */
.status-row{display:flex;gap:8px;margin-top:10px;}
.status-btn{flex:1;padding:8px;border-radius:var(--radius-sm);border:1px solid var(--border2);font-size:12px;cursor:pointer;background:var(--bg2);color:var(--text2);font-weight:500;}
.status-btn.active-pend{background:var(--a50);color:var(--a600);border-color:var(--a200);}
.status-btn.active-listo{background:var(--g50);color:var(--g800);border-color:var(--g400);}
.status-btn.active-entre{background:var(--gr50);color:var(--gr600);border-color:var(--gr400);}

/* Albaranes */
.alb-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.alb-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.alb-btn-small{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--b600);background:transparent;color:var(--b600);cursor:pointer;}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <h2>KOBO</h2>
  <p>Cargando datos...</p>
</div>

<div class="header">
  <div class="brand">KO<span>BO</span></div>
  <div class="header-date" id="header-date"></div>
</div>

<!-- PEDIDOS -->
<div class="panel active" id="panel-pedidos">
  <div class="stats">
    <div class="stat"><div class="stat-lbl">Activos hoy</div><div class="stat-val" id="s-activos">—</div><div class="stat-sub">pedidos</div></div>
    <div class="stat"><div class="stat-lbl">Este mes</div><div class="stat-val" id="s-mes">—</div><div class="stat-sub">facturado</div></div>
  </div>
  <div class="sec-hdr">
    <span class="sec-title">Pedidos</span>
    <button class="btn-new" onclick="openNuevoPedido()">+ Nuevo</button>
  </div>
  <div class="chips">
    <button class="chip active" onclick="filterPedidos('todos',this)">Todos</button>
    <button class="chip" onclick="filterPedidos('particular',this)">Particulares</button>
    <button class="chip" onclick="filterPedidos('profesional',this)">Profesionales</button>
    <button class="chip" onclick="filterPedidos('pendiente',this)">Pendientes</button>
    <button class="chip" onclick="filterPedidos('listo',this)">Listos</button>
  </div>
  <div id="orders-list"></div>
</div>

<!-- CLIENTES -->
<div class="panel" id="panel-clientes">
  <div class="sec-hdr">
    <span class="sec-title">Clientes profesionales</span>
    <button class="btn-new" onclick="openNuevoCliente()">+ Nuevo</button>
  </div>
  <div id="clients-list"></div>
</div>

<!-- ALBARANES -->
<div class="panel" id="panel-albaranes">
  <div class="stats">
    <div class="stat"><div class="stat-lbl">Por facturar</div><div class="stat-val" id="s-porfacturar">—</div><div class="stat-sub">importe</div></div>
    <div class="stat"><div class="stat-lbl">Este mes</div><div class="stat-val" id="s-alb-mes">—</div><div class="stat-sub">albaranes</div></div>
  </div>
  <div class="sec-hdr"><span class="sec-title">Albaranes</span></div>
  <div id="alb-list"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('pedidos',this)"><span class="nav-icon">📋</span>Pedidos</button>
  <button class="nav-btn" onclick="switchTab('clientes',this)"><span class="nav-icon">🏪</span>Clientes</button>
  <button class="nav-btn" onclick="switchTab('albaranes',this)"><span class="nav-icon">📄</span>Albaranes</button>
</nav>

<!-- MODAL -->
<div class="modal-bd" id="modal" onclick="closeMOut(event)">
  <div class="modal" id="modal-inner">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbykvz5mvtq37Z_vFJh1wCh4pkWqwjrzsXWdNWopCaSeLSyxS4kOlbj4LMDtCHLVjQu5/exec';
const IVA = 0.04;

let productos = [];
let clientes = [];
let pedidos = [];
let albaranes = [];
let curFilter = 'todos';
let curQtys = {};
let curTipo = 'particular';
let curClienteId = null;

// --- API ---
async function api(params) {
  const url = SCRIPT_URL + '?' + new URLSearchParams(params);
  const res = await fetch(url);
  return res.json();
}

async function loadAll() {
  try {
    [productos, clientes, pedidos, albaranes] = await Promise.all([
      api({action:'getProductos'}),
      api({action:'getClientes'}),
      api({action:'getPedidos'}),
      api({action:'getAlbaranes'}),
    ]);
    clientes = clientes.map(c => ({
      ...c,
      Precios: c.Precios ? JSON.parse(c.Precios) : {}
    }));
    pedidos = pedidos.map(p => ({
      ...p,
      Lineas: p.Lineas ? JSON.parse(p.Lineas) : []
    }));
    albaranes = albaranes.map(a => ({
      ...a,
      Lineas: a.Lineas ? JSON.parse(a.Lineas) : []
    }));
    renderAll();
    document.getElementById('loading').style.display = 'none';
  } catch(e) {
    document.getElementById('loading').innerHTML = '<p style="color:red;padding:2rem;text-align:center">Error conectando con Google Sheets.<br>Comprueba tu conexión.</p>';
  }
}

// --- RENDER ---
function renderAll() {
  renderPedidos(curFilter);
  renderClientes();
  renderAlbaranes();
  updateStats();
}

function fmtDate(d) {
  if (!d) return '—';
  const s = d.toString();
  if (s.includes('/')) return s;
  const [y,m,day] = s.split('-');
  return `${day}/${m}/${y}`;
}

function fmtDateShort(d) {
  if (!d) return '—';
  const s = d.toString();
  const parts = s.includes('-') ? s.split('-') : s.split('/').reverse();
  return `${parts[2]}/${parts[1]}`;
}

function initials(n) {
  return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

function resumeLineas(lineas) {
  if (!lineas || !lineas.length) return '—';
  return lineas.map(l => `${l.qty} ${l.nombre}`).join(', ');
}

function updateStats() {
  const hoy = new Date().toISOString().slice(0,10);
  const activos = pedidos.filter(p => p.Estado !== 'entregado').length;
  const mes = new Date().getMonth();
  const anyo = new Date().getFullYear();
  const totalMes = pedidos
    .filter(p => {
      const f = p.Fecha ? p.Fecha.toString() : '';
      return f.startsWith(`${anyo}-${String(mes+1).padStart(2,'0')}`);
    })
    .reduce((sum, p) => sum + (parseFloat(p.Total) || 0), 0);

  document.getElementById('s-activos').textContent = activos;
  document.getElementById('s-mes').textContent = '€' + totalMes.toFixed(0);

  const porFacturar = albaranes
    .filter(a => a.Facturado === 'NO' || a.Facturado === '')
    .reduce((sum, a) => sum + (parseFloat(a.Importe) || 0), 0);
  const albMes = albaranes.filter(a => {
    const f = a.Fecha ? a.Fecha.toString() : '';
    return f.startsWith(`${anyo}-${String(mes+1).padStart(2,'0')}`);
  }).length;
  document.getElementById('s-porfacturar').textContent = '€' + porFacturar.toFixed(0);
  document.getElementById('s-alb-mes').textContent = albMes;
}

function renderPedidos(filter) {
  const list = document.getElementById('orders-list');
  let data = [...pedidos].reverse();
  if (filter === 'particular' || filter === 'profesional') data = data.filter(p => p.Tipo === filter);
  else if (filter === 'pendiente' || filter === 'listo') data = data.filter(p => p.Estado === filter);

  if (!data.length) { list.innerHTML = '<div class="empty">Sin pedidos</div>'; return; }

  list.innerHTML = data.map(p => {
    const bE = p.Estado==='pendiente'?'b-pend':p.Estado==='listo'?'b-listo':'b-entre';
    const lE = p.Estado==='pendiente'?'Pendiente':p.Estado==='listo'?'Listo':'Entregado';
    const tB = p.Tipo==='profesional'?'<span class="badge b-prof" style="margin-right:4px">Profesional</span>':'<span class="badge b-part" style="margin-right:4px">Particular</span>';
    const aB = p.Albaran ? `<span class="badge b-alb">${p.Albaran}</span>` : '';
    const totalConIva = (parseFloat(p.Total)||0) * (1 + IVA);
    return `<div class="card" onclick="openDetallePedido('${p.ID}')">
      <div class="card-top"><div><div class="card-name">${p.Cliente}</div><div class="card-sub">${p.ID}</div></div><span class="badge ${bE}">${lE}</span></div>
      <div class="card-body">${resumeLineas(p.Lineas)}</div>
      <div class="card-foot">
        <div style="display:flex;gap:4px;flex-wrap:wrap">${tB}${aB}</div>
        <div style="text-align:right"><div class="price-lbl">€${totalConIva.toFixed(2)}</div><div class="time-lbl">${fmtDateShort(p.Fecha)} · ${p.Hora||''}</div></div>
      </div>
    </div>`;
  }).join('');
}

function renderClientes() {
  const list = document.getElementById('clients-list');
  if (!clientes.length) { list.innerHTML = '<div class="empty">Sin clientes profesionales</div>'; return; }
  list.innerHTML = clientes.map(c => {
    const precios = c.Precios || {};
    const tarifaRows = Object.keys(precios).map(pid => {
      const prod = productos.find(p => p.ID === pid);
      if (!prod) return '';
      return `<div class="tarifa-row"><span class="tarifa-nombre">${prod.Nombre} ${prod.Formato}</span><span class="tarifa-precio">€${parseFloat(precios[pid]).toFixed(2)}</span></div>`;
    }).join('');
    const pendiente = parseFloat(c.Pendiente) || 0;
    const pendStrip = pendiente > 0 ? `<div class="pend-strip"><span>Pendiente: €${pendiente.toFixed(2)}</span><button class="pend-btn" onclick="event.stopPropagation();showToast('Función de factura próximamente')">Generar factura</button></div>` : '';
    return `<div class="client-card">
      <div class="client-top">
        <div class="avatar">${initials(c.Nombre)}</div>
        <div><div class="card-name">${c.Nombre}</div><div class="card-sub" style="font-size:12px;color:var(--text3)">${c.Contacto} · ${c.NIF}</div></div>
      </div>
      <div class="client-rows">
        <div class="client-row"><span>Teléfono</span><span><a href="tel:${c.Telefono}" onclick="event.stopPropagation()">${c.Telefono||'—'}</a></span></div>
        <div class="client-row"><span>Dirección</span><span>${c.Direccion||'—'}</span></div>
        <div class="client-row"><span>Alta</span><span>${fmtDate(c.Alta)}</span></div>
        <div class="client-row"><span>Último pedido</span><span>${fmtDate(c.UltimoPedido)}</span></div>
      </div>
      ${tarifaRows ? `<div class="tarifa-section"><div class="tarifa-title">Tarifa pactada (sin IVA)</div>${tarifaRows}</div>` : ''}
      ${pendStrip}
    </div>`;
  }).join('');
}

function renderAlbaranes() {
  const list = document.getElementById('alb-list');
  const data = [...albaranes].reverse();
  if (!data.length) { list.innerHTML = '<div class="empty">Sin albaranes</div>'; return; }
  list.innerHTML = data.map(a => {
    const facturado = a.Facturado === 'SI';
    return `<div class="alb-card">
      <div class="alb-top">
        <div><div class="card-name">${a.ClienteID}</div><div class="card-sub">${a.ID} · ${fmtDate(a.Fecha)}</div></div>
        <div style="text-align:right"><div class="price-lbl">€${(parseFloat(a.Importe)||0).toFixed(2)}</div><span class="badge ${facturado?'b-entre':'b-alb'}">${facturado?'Facturado':'Pendiente'}</span></div>
      </div>
      <div class="card-body">${resumeLineas(a.Lineas)}</div>
    </div>`;
  }).join('');
}

// --- FILTROS ---
function filterPedidos(f, el) {
  curFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderPedidos(f);
}

function switchTab(tab, el) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  ['pedidos','clientes','albaranes'].forEach(p => {
    document.getElementById('panel-'+p).classList.toggle('active', p===tab);
  });
}

// --- MODAL ---
function openModal(title, body) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function closeMOut(e) { if (e.target === document.getElementById('modal')) closeModal(); }

// --- NUEVO PEDIDO ---
function openNuevoPedido() {
  curQtys = {}; curTipo = 'particular'; curClienteId = null;
  openModal('Nuevo pedido', buildPedidoForm());
}

function buildPedidoForm() {
  const clienteOptions = clientes.map(c => `<option value="${c.ID}">${c.Nombre}</option>`).join('');
  return `
    <div class="type-toggle">
      <button class="tt-btn ap" id="tt-part" onclick="setTipo('particular')">Particular</button>
      <button class="tt-btn" id="tt-prof" onclick="setTipo('profesional')">Profesional</button>
    </div>
    <div class="f-row" id="campo-cliente">
      <label class="f-lbl">Cliente</label>
      <input type="text" id="f-cli" placeholder="Nombre del cliente"/>
    </div>
    <div class="f-row hidden" id="campo-prof-extra">
      <p class="f-note" style="margin-bottom:0">Precios cargados automáticamente según cliente.</p>
    </div>
    <div class="divider"></div>
    <div class="f-lbl" style="margin-bottom:8px">Productos</div>
    <div class="prod-selector" id="prod-selector">${buildProdSelector()}</div>
    <div class="total-box">
      <span class="total-lbl">Total (sin IVA)</span>
      <div style="text-align:right">
        <div class="total-val" id="total-display">€0.00</div>
        <div class="iva-note" id="total-iva">Con IVA (4%): €0.00</div>
      </div>
    </div>
    <div class="f-grid">
      <div class="f-row"><label class="f-lbl">Fecha recogida</label><input type="date" id="f-fecha"/></div>
      <div class="f-row"><label class="f-lbl">Hora</label><input type="time" id="f-hora"/></div>
    </div>
    <button class="btn-ok" onclick="savePedido()">Guardar pedido</button>
    <button class="btn-cancel" onclick="closeModal()">Cancelar</button>`;
}

function buildProdSelector() {
  const prodsVisibles = curTipo === 'particular'
    ? productos.filter(p => p.Solo_Prof !== 'SI' && p.Solo_Prof !== 'SI' && (p.PVP !== '' && p.PVP !== undefined))
    : productos.filter(p => {
        if (!curClienteId) return false;
        const c = clientes.find(x => x.ID === curClienteId);
        return c && c.Precios && c.Precios[p.ID] !== undefined;
      });

  if (!prodsVisibles.length) {
    return '<div style="padding:20px;text-align:center;font-size:13px;color:var(--text3)">Selecciona un cliente profesional para ver sus productos</div>';
  }

  return prodsVisibles.map(p => {
    const precio = getPrecio(p.ID);
    return `<div class="prod-item">
      <div class="prod-info">
        <div class="prod-name">${p.Nombre} <span style="font-size:11px;color:var(--text3)">${p.Formato}</span></div>
        <div class="prod-price">€${precio.toFixed(2)} / ${p.Unidad} (sin IVA)</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty('${p.ID}',-1)">−</button>
        <span class="qty-val" id="qty-${p.ID}">${curQtys[p.ID]||0}</span>
        <button class="qty-btn" onclick="changeQty('${p.ID}',1)">+</button>
      </div>
    </div>`;
  }).join('');
}

function getPrecio(prodId) {
  if (curTipo === 'profesional' && curClienteId) {
    const c = clientes.find(x => x.ID === curClienteId);
    if (c && c.Precios && c.Precios[prodId] !== undefined) return parseFloat(c.Precios[prodId]);
  }
  const p = productos.find(x => x.ID === prodId);
  return p ? parseFloat(p.PVP) || 0 : 0;
}

function calcTotal() {
  return productos.reduce((sum, p) => sum + (curQtys[p.ID]||0) * getPrecio(p.ID), 0);
}

function updateTotal() {
  const t = calcTotal();
  const el = document.getElementById('total-display');
  const elIva = document.getElementById('total-iva');
  if (el) el.textContent = '€' + t.toFixed(2);
  if (elIva) elIva.textContent = 'Con IVA (4%): €' + (t * 1.04).toFixed(2);
}

function changeQty(prodId, delta) {
  curQtys[prodId] = Math.max(0, (curQtys[prodId]||0) + delta);
  const el = document.getElementById('qty-' + prodId);
  if (el) el.textContent = curQtys[prodId];
  updateTotal();
}

function setTipo(t) {
  curTipo = t; curClienteId = null; curQtys = {};
  document.getElementById('tt-part').className = t==='particular' ? 'tt-btn ap' : 'tt-btn';
  document.getElementById('tt-prof').className = t==='profesional' ? 'tt-btn ab' : 'tt-btn';

  const campoCli = document.getElementById('campo-cliente');
  const campoExtra = document.getElementById('campo-prof-extra');

  if (t === 'particular') {
    campoCli.innerHTML = `<label class="f-lbl">Cliente</label><input type="text" id="f-cli" placeholder="Nombre del cliente"/>`;
    campoExtra.classList.add('hidden');
  } else {
    const opts = clientes.map(c => `<option value="${c.ID}">${c.Nombre}</option>`).join('');
    campoCli.innerHTML = `<label class="f-lbl">Cliente</label><select id="f-cli-sel" onchange="onClienteChange(this.value)"><option value="">Seleccionar cliente...</option>${opts}</select>`;
    campoExtra.classList.remove('hidden');
  }
  document.getElementById('prod-selector').innerHTML = buildProdSelector();
  updateTotal();
}

function onClienteChange(val) {
  curClienteId = val || null;
  document.getElementById('prod-selector').innerHTML = buildProdSelector();
  updateTotal();
}

async function savePedido() {
  const lineas = productos
    .filter(p => (curQtys[p.ID]||0) > 0)
    .map(p => ({ id: p.ID, nombre: `${p.Nombre} ${p.Formato}`, qty: curQtys[p.ID], unidad: p.Unidad }));

  if (!lineas.length) { showToast('Añade al menos un producto'); return; }

  let clienteNombre = '';
  if (curTipo === 'particular') {
    clienteNombre = document.getElementById('f-cli')?.value.trim() || '';
  } else {
    const sel = document.getElementById('f-cli-sel');
    clienteNombre = sel ? sel.options[sel.selectedIndex]?.text : '';
    if (!curClienteId) { showToast('Selecciona un cliente'); return; }
  }
  if (!clienteNombre) { showToast('Introduce el nombre del cliente'); return; }

  const fecha = document.getElementById('f-fecha')?.value || new Date().toISOString().slice(0,10);
  const hora = document.getElementById('f-hora')?.value || '';
  const total = calcTotal();
  const newId = 'P-' + String(pedidos.length + 1).padStart(3,'0');
  const albId = curTipo === 'profesional' ? 'ALB-' + String(albaranes.length + 1).padStart(3,'0') : '';

  const pedido = {
    ID: newId, Cliente: clienteNombre, Tipo: curTipo,
    Fecha: fecha, Hora: hora, Estado: 'pendiente',
    Total: total.toFixed(2), Albaran: albId,
    Lineas: JSON.stringify(lineas)
  };

  showToast('Guardando...');
  await api({ action: 'savePedido', data: JSON.stringify(pedido) });

  if (albId) {
    const albaran = {
      ID: albId, ClienteID: clienteNombre, Fecha: fecha,
      Lineas: JSON.stringify(lineas),
      Importe: total.toFixed(2), Facturado: 'NO'
    };
    await api({ action: 'saveAlbaran', data: JSON.stringify(albaran) });
    albaranes.push({ ...albaran, Lineas: lineas });

    // Actualizar pendiente del cliente
    const cliente = clientes.find(c => c.ID === curClienteId);
    if (cliente) {
      const nuevoPendiente = (parseFloat(cliente.Pendiente)||0) + total;
      await api({ action: 'updateCliente', data: JSON.stringify({ ID: curClienteId, Pendiente: nuevoPendiente.toFixed(2), UltimoPedido: fecha }) });
      cliente.Pendiente = nuevoPendiente.toFixed(2);
      cliente.UltimoPedido = fecha;
    }
  }

  pedidos.push({ ...pedido, Lineas: lineas });
  closeModal();
  renderAll();
  showToast('✓ Pedido guardado');
}

// --- DETALLE PEDIDO ---
function openDetallePedido(id) {
  const p = pedidos.find(x => x.ID === id);
  if (!p) return;
  const totalIva = (parseFloat(p.Total)||0) * 1.04;
  const estadoActual = p.Estado;
  openModal(`Pedido ${p.ID}`, `
    <div style="margin-bottom:14px">
      <div style="font-size:16px;font-weight:600;margin-bottom:4px">${p.Cliente}</div>
      <div style="font-size:13px;color:var(--text2)">${fmtDate(p.Fecha)} · ${p.Hora||''}</div>
    </div>
    <div class="card-body" style="margin-bottom:12px">${resumeLineas(p.Lineas)}</div>
    <div class="total-box" style="margin-bottom:14px">
      <span class="total-lbl">Total</span>
      <div style="text-align:right">
        <div class="total-val">€${totalIva.toFixed(2)}</div>
        <div class="iva-note">Sin IVA: €${parseFloat(p.Total).toFixed(2)}</div>
      </div>
    </div>
    <div class="f-lbl">Cambiar estado</div>
    <div class="status-row">
      <button class="status-btn ${estadoActual==='pendiente'?'active-pend':''}" onclick="cambiarEstado('${id}','pendiente')">Pendiente</button>
      <button class="status-btn ${estadoActual==='listo'?'active-listo':''}" onclick="cambiarEstado('${id}','listo')">Listo</button>
      <button class="status-btn ${estadoActual==='entregado'?'active-entre':''}" onclick="cambiarEstado('${id}','entregado')">Entregado</button>
    </div>
    <button class="btn-cancel" onclick="closeModal()" style="margin-top:14px">Cerrar</button>
  `);
}

async function cambiarEstado(id, estado) {
  await api({ action: 'updatePedido', data: JSON.stringify({ ID: id, Estado: estado }) });
  const p = pedidos.find(x => x.ID === id);
  if (p) p.Estado = estado;
  closeModal();
  renderAll();
  showToast('✓ Estado actualizado');
}

// --- NUEVO CLIENTE ---
function openNuevoCliente() {
  const tarifaInputs = productos.map(p =>
    `<div class="prod-item">
      <div class="prod-info"><div class="prod-name">${p.Nombre} <span style="font-size:11px;color:var(--text3)">${p.Formato}</span></div><div class="prod-price">PVP: €${parseFloat(p.PVP||0).toFixed(2)}</div></div>
      <input type="number" id="tp-${p.ID}" placeholder="—" step="0.01" style="width:70px;padding:6px;border:1px solid var(--border2);border-radius:6px;font-size:14px;text-align:right"/>
    </div>`
  ).join('');

  openModal('Nuevo cliente profesional', `
    <div class="f-row"><label class="f-lbl">Nombre del negocio</label><input type="text" id="f-neg" placeholder="Café Ejemplo"/></div>
    <div class="f-row"><label class="f-lbl">NIF / CIF</label><input type="text" id="f-nif" placeholder="B12345678"/></div>
    <div class="f-row"><label class="f-lbl">Persona de contacto</label><input type="text" id="f-con" placeholder="Nombre y apellido"/></div>
    <div class="f-row"><label class="f-lbl">Teléfono</label><input type="tel" id="f-tel" placeholder="600 000 000"/></div>
    <div class="f-row"><label class="f-lbl">Dirección</label><input type="text" id="f-dir" placeholder="Calle, número, ciudad"/></div>
    <div class="divider"></div>
    <div class="f-lbl" style="margin-bottom:8px">Tarifa pactada (€ sin IVA) — deja en blanco los que no compre</div>
    <div class="prod-selector">${tarifaInputs}</div>
    <button class="btn-ok" onclick="saveCliente()">Guardar cliente</button>
    <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
  `);
}

async function saveCliente() {
  const neg = document.getElementById('f-neg')?.value.trim() || '';
  const nif = document.getElementById('f-nif')?.value.trim() || '';
  if (!neg || !nif) { showToast('Nombre y NIF obligatorios'); return; }

  const precios = {};
  productos.forEach(p => {
    const v = parseFloat(document.getElementById('tp-'+p.ID)?.value);
    if (!isNaN(v) && v > 0) precios[p.ID] = v;
  });

  const newId = 'C-' + String(clientes.length + 1).padStart(3,'0');
  const hoy = new Date().toISOString().slice(0,10);
  const cliente = {
    ID: newId,
    Nombre: neg, NIF: nif,
    Contacto: document.getElementById('f-con')?.value.trim() || '',
    Telefono: document.getElementById('f-tel')?.value.trim() || '',
    Direccion: document.getElementById('f-dir')?.value.trim() || '',
    Alta: hoy, UltimoPedido: '', Pendiente: '0',
    Precios: JSON.stringify(precios)
  };

  showToast('Guardando...');
  await api({ action: 'saveCliente', data: JSON.stringify(cliente) });
  clientes.push({ ...cliente, Precios: precios });
  closeModal();
  renderClientes();
  showToast('✓ Cliente guardado');
}

// --- TOAST ---
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// --- INIT ---
const d = new Date();
document.getElementById('header-date').textContent = d.toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long'});
loadAll();
</script>
